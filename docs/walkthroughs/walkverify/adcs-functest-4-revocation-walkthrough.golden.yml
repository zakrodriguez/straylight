  - CERT_TRUST_IS_REVOKED
  - CRYPT_E_REVOKED
  strict: false
  captured: "\nChainContext.dwErrorStatus = CERT_TRUST_IS_REVOKED (0x4)\nSimpleChain.dwErrorStatus\
    \ = CERT_TRUST_IS_REVOKED (0x4)\nCertContext[0][0]: dwInfoStatus=102 dwErrorStatus=4\n\
    \  Element.dwErrorStatus = CERT_TRUST_IS_REVOKED (0x4)\n  Failed \"AIA\" Time:\
    \ 0 (null)\n    Error retrieving URL: Not found (404). 0x80190194 (-2145844844\
