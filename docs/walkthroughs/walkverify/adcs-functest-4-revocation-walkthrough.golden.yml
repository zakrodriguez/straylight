    \ (-2145844844 HTTP_E_STATUS_NOT_FOUND)\nCertContext[0][2]: dwInfoStatus=10c dwErrorStatus=0\n\
    The certificate is revoked. 0x80092010 (-2146885616 CRYPT_E_REVOKED)\nCertificate\
