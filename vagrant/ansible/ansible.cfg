[defaults]
# Disable SSH host key checking (not relevant for WinRM, but good practice)
host_key_checking = False
deprecation_warnings = False
system_warnings = False

# Increase default timeout for Windows operations
timeout = 60

# Use the ansible.windows collection for WinRM
transport = winrm

# Roles path relative to this config file
roles_path = roles

# Log all Ansible output to a host-side file
log_path = ../logs/ansible.log

# Per-task timing: ISO timestamps, elapsed, cumulative, end summary
callback_whitelist = task_timer

[persistent_connections]
connect_timeout = 60
command_timeout = 1800
