---
# WEB1 - CRL/AIA Distribution Point
# Pre-installs IIS, joins domain, configures PKI website
- hosts: all
  gather_facts: false
  tasks:
    - name: Include psframework role
      ansible.builtin.include_role:
        name: psframework

    - name: Include common role
      ansible.builtin.include_role:
        name: common
      vars:
        dns_servers:
          - "{{ dc_ip }}"

    # Pre-install IIS roles while DC1 is building (overlaps with DC promo)
    - name: Pre-install IIS features
      ansible.windows.win_feature:
        name:
          - Web-Server
          - Web-Default-Doc
          - Web-Dir-Browsing
          - Web-Http-Errors
          - Web-Static-Content
        include_management_tools: true
        state: present

    - name: Include domain_join role
      ansible.builtin.include_role:
        name: domain_join

    - name: Include web_server role
      ansible.builtin.include_role:
        name: web_server

    - name: Include machine_cert role
      ansible.builtin.include_role:
        name: machine_cert

    - name: Include sysinternals role
      ansible.builtin.include_role:
        name: sysinternals

    - name: Include bginfo role
      ansible.builtin.include_role:
        name: bginfo
      vars:
        vm_role: web

    - name: Include windows_logging role
      ansible.builtin.include_role:
        name: windows_logging

    - name: Include sysmon role
      ansible.builtin.include_role:
        name: sysmon

    - name: Include winlogbeat role
      ansible.builtin.include_role:
        name: winlogbeat
      vars:
        winlogbeat_iis_channels: true

    - name: Include filebeat_iis role (IIS access logs)
      ansible.builtin.include_role:
        name: filebeat_iis
