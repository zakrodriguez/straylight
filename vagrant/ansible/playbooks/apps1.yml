---
# APPS1 - Target applications for CBOM scanning
- hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: Include common_linux role
      ansible.builtin.include_role:
        name: common_linux

    - name: Include docker_host role
      ansible.builtin.include_role:
        name: docker_host

    - name: Include keycloak role
      ansible.builtin.include_role:
        name: keycloak

    - name: Include vault role
      ansible.builtin.include_role:
        name: vault

    - name: Include nifi role
      ansible.builtin.include_role:
        name: nifi

    - name: Include gitea role
      ansible.builtin.include_role:
        name: gitea

    - name: Include minio role
      ansible.builtin.include_role:
        name: minio

    - name: Include filebeat role
      ansible.builtin.include_role:
        name: filebeat
