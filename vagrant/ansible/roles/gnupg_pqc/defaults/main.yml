---
# gnupg_pqc role defaults — build GnuPG 2.5+ with PQC primitives (ML-DSA,
# ML-KEM) from RFC 9580 and generate a composite ECC+Kyber OpenPGP key.
# Callers may override any of these via play/inventory vars.
gnupg_pqc_prefix: /opt/gnupg-pqc                 # install prefix
gnupg_pqc_version: "2.5.13"                       # GnuPG source version

# Key-generation vars (consumed by keygen.yml). Dedicated GNUPGHOME under the
# install prefix so the lab user's ~/.gnupg stays untouched.
gnupg_pqc_homedir: /opt/gnupg-pqc/home
gnupg_pqc_uid: "Straylight PQC Demo <pqc@yourlab.local>"
gnupg_pqc_email: "pqc@yourlab.local"
gnupg_pqc_validity: "2y"
