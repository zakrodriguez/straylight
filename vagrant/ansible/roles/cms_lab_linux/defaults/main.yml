---
# cms_lab_linux role: stages CMS (RFC 5652) hands-on lab on scanner1.
# Companion to cms_lab_windows on manage1.

# Lab output root. All exercise artifacts live under here.
cms_lab_root: /opt/cms-lab

# OpenSSL 3.5+ binary with native ML-DSA / ML-KEM support (installed by
# openssl_35 role on scanner1). System /usr/bin/openssl on Ubuntu 22.04
# is 3.0.x and doesn't have PQC algorithms.
cms_lab_openssl: /opt/openssl-3.5/bin/openssl

# Cert subjects (kept simple, deterministic).
cms_lab_self_rsa_subject: "/CN=cms-lab-scanner1-self-rsa/O={{ lab_netbios }}"
cms_lab_self_ecdsa_subject: "/CN=cms-lab-scanner1-self-ecdsa/O={{ lab_netbios }}"
cms_lab_rsa_labca_subject: "/CN=cms-lab-scanner1-rsa"
cms_lab_ml_dsa_subject: "/CN=cms-lab-scanner1-ml-dsa"

# AD CS CSR delegation targets. The canonical CA host / config / template
# strings live in vagrant/ansible/vars/cms_lab_ca.yml (single source of truth,
# shared with cms_lab_windows); main.yml include_vars-loads it before these
# aliases resolve. Var names mirror the cms_lab_win_* set for symmetry.
cms_lab_ca_host: "{{ cms_lab_ca_host_classical }}"
cms_lab_ca_config: "{{ cms_lab_ca_config_classical }}"
cms_lab_ca_template: "{{ cms_lab_template_classical }}"

cms_lab_pqc_ca_host: "{{ cms_lab_ca_host_pqc }}"
cms_lab_pqc_ca_config: "{{ cms_lab_ca_config_pqc }}"
cms_lab_pqc_template: "{{ cms_lab_template_pqc }}"
