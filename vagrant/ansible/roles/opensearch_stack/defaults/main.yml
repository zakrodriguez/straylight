---
# Beats → OpenSearch HTTP Basic Auth credentials (canonical defaults live in
# vagrant/ansible/group_vars/all.yml so observe_tls + filebeat + winlogbeat +
# filebeat_iis all read the same values). Re-declared here at the role level
# as a safety net for cases where group_vars are bypassed.
beats_basic_auth_user: beats
beats_basic_auth_password: "{{ admin_password }}"
beats_tls_port: 9244

# ── Observability contracts + retention ─────────────────────────────────────
# ISM retention: how long a log/cbom index lives before the delete phase
# reclaims it. Single-node lab cluster — disk-fill is the most likely silent
# long-term failure mode, so default to a conservative window. Override per
# profile if you need a longer history.
observability_retention_days: 14
observability_ism_policy_id: straylight-retention

# Index template names + the patterns each manages. Beats ship to date-suffixed
# logs-windows-* / logs-linux-* (winlogbeat/filebeat templates), so the ISM
# delete phase ages out whole daily indices instead of letting one fixed-name
# index grow unbounded.
observability_logs_template_name: straylight-logs
observability_logs_index_patterns:
  - "logs-windows*"
  - "logs-linux*"
observability_cbom_template_name: straylight-cbom

# ISM auto-attach: any newly-created index matching these patterns inherits the
# retention policy without an explicit per-index settings call.
observability_ism_index_patterns:
  - "logs-windows*"
  - "logs-linux*"
  - "cbom"
  - "cbom-*"
